server {
    listen 8080;            # Sets the port
    server_name localhost;  # The name of this server

    root /usr/share/nginx/html; # Where your Vue build files are stored
    index index.html;           # The first file to load

    location / {
        # THE MOST IMPORTANT PART:
        # 1. Look for a real file (like logo.png)
        # 2. Look for a folder
        # 3. If neither exists, send everything to index.html
        # This allows Vue Router to handle the URL without 404 errors.
        try_files $uri $uri/ /index.html;
    }
}